<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>KoeMo ドキュメント</title>
  <meta name="description" content="KoeMo（コエモ）公式ドキュメント — あなたの声に表情がつくギミック">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'KoeMo ドキュメント',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        placeholder: '検索',
        noData: '見つかりませんでした',
        depth: 4
      },
      formatUpdated: '{MM}/{DD} {HH}:{mm}',
      plugins: [
        function(hook) {
          hook.doneEach(function() {
            document.querySelectorAll('code.lang-mermaid').forEach(function(el) {
              var code = el.textContent;
              var div = document.createElement('div');
              div.className = 'mermaid';
              div.textContent = code;
              el.parentNode.replaceWith(div);
            });
            mermaid.init(undefined, '.mermaid');
          });
        }
      ]
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://unpkg.com/mermaid@9/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({ startOnLoad: false, theme: 'default' });</script>
</body>
</html>
